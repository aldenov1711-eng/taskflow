<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QuickNotes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>QuickNotes - Catatan Cepat</title>
    
    <!-- MANIFEST PWA -->
    <script>
        // Service Worker buat offline mode
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>

    <style>
        :root {
            --biru: #2563eb;
            --biru-muda: #3b82f6;
            --biru-pucat: #dbeafe;
            --putih: #ffffff;
            --putih-abu: #f8fafc;
            --border: #e2e8f0;
            --text-gelap: #1e293b;
            --text-abu: #64748b;
            --merah: #ef4444;
            --hijau: #22c55e;
            --kuning: #f59e0b;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #eff6ff;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: #f8fafc;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        .app-header {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            padding: 16px 20px;
            padding-top: calc(16px + var(--safe-area-top));
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .note-count {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        .input-area {
            background: white;
            padding: 14px 18px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 60px;
            z-index: 99;
        }

        .input-note {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            background: var(--putih-abu);
            color: var(--text-gelap);
            transition: all 0.3s;
        }

        .input-note:focus {
            border-color: var(--biru);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
            background: white;
        }

        .btn-add {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(37,99,235,0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add:active {
            transform: scale(0.9);
        }

        .notes-list {
            padding: 10px 15px 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .note-card {
            background: white;
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
            position: relative;
            animation: slideUp 0.3s ease;
            border-left: 4px solid var(--biru);
            cursor: pointer;
        }

        .note-card:active {
            transform: scale(0.98);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-text {
            font-size: 15px;
            color: var(--text-gelap);
            font-weight: 500;
            line-height: 1.5;
            word-break: break-word;
            padding-right: 30px;
        }

        .note-date {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 8px;
            font-weight: 500;
        }

        .btn-delete {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-delete:active {
            background: #fef2f2;
            color: var(--merah);
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #94a3b8;
        }

        .empty-icon {
            font-size: 70px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-gelap);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 13px;
            color: #94a3b8;
        }

        .fab {
            position: fixed;
            bottom: calc(25px + var(--safe-area-bottom));
            right: 25px;
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(37,99,235,0.4);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .fab:active {
            transform: scale(0.85) rotate(45deg);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 25px 20px 35px;
            padding-bottom: calc(35px + var(--safe-area-bottom));
            width: 100%;
            max-width: 500px;
            animation: slideUpModal 0.3s ease;
        }

        @keyframes slideUpModal {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            background: var(--putih-abu);
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .modal-input:focus {
            border-color: var(--biru);
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: var(--putih-abu);
            border: 2px solid var(--border);
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            color: var(--text-abu);
        }

        .btn-save {
            flex: 2;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37,99,235,0.3);
        }

        .btn-save:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: calc(100px + var(--safe-area-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            z-index: 500;
            animation: toastIn 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (min-width: 500px) {
            .app-container {
                border-radius: 24px;
                margin-top: 20px;
                min-height: calc(100vh - 40px);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <span class="app-title">📝 QuickNotes</span>
            <span class="note-count" id="noteCount">0 Catatan</span>
        </div>

        <div class="input-area">
            <input type="text" class="input-note" id="noteInput" placeholder="✍️ Tulis catatan..." autocomplete="off">
            <button class="btn-add" onclick="tambahNote()">+</button>
        </div>

        <div class="notes-list" id="notesList"></div>
    </div>

    <button class="fab" id="fabBtn" onclick="bukaModal()">+</button>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal-content">
            <input type="text" class="modal-input" id="modalInput" placeholder="✍️ Tulis catatan panjang..." autocomplete="off">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button class="btn-save" onclick="simpanDariModal()">💾 Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'quicknotes_app';
        let daftarNotes = [];

        function loadNotes() {
            daftarNotes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveNotes() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(daftarNotes));
        }

        function tambahNote() {
            const input = document.getElementById('noteInput');
            const teks = input.value.trim();
            if (!teks) return;
            daftarNotes.unshift({
                id: Date.now(),
                teks: teks,
                tanggal: new Date().toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            });
            saveNotes();
            input.value = '';
            renderNotes();
            tampilToast('✅ Tersimpan!');
        }

        function hapusNote(id) {
            if (confirm('Hapus catatan ini?')) {
                daftarNotes = daftarNotes.filter(n => n.id !== id);
                saveNotes();
                renderNotes();
                tampilToast('🗑️ Dihapus');
            }
        }

        function bukaModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('modalInput').focus();
        }

        function tutupModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('modalInput').value = '';
        }

        function simpanDariModal() {
            const teks = document.getElementById('modalInput').value.trim();
            if (!teks) { tutupModal(); return; }
            daftarNotes.unshift({
                id: Date.now(),
                teks: teks,
                tanggal: new Date().toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            });
            saveNotes();
            tutupModal();
            renderNotes();
            tampilToast('✅ Tersimpan!');
        }

        function editNote(id) {
            const note = daftarNotes.find(n => n.id === id);
            if (!note) return;
            const baru = prompt('✏️ Edit:', note.teks);
            if (baru && baru.trim()) {
                note.teks = baru.trim();
                note.tanggal = new Date().toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' (diedit)';
                saveNotes();
                renderNotes();
                tampilToast('✏️ Diupdate!');
            }
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            document.getElementById('noteCount').textContent = daftarNotes.length + ' Catatan';
            if (daftarNotes.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>Belum ada catatan</h3><p>Ketik di atas atau tap +</p></div>';
                return;
            }
            list.innerHTML = daftarNotes.map(n => `
                <div class="note-card" onclick="editNote(${n.id})">
                    <div class="note-text">${n.teks.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                    <div class="note-date">🕐 ${n.tanggal}</div>
                    <button class="btn-delete" onclick="event.stopPropagation(); hapusNote(${n.id})">✕</button>
                </div>
            `).join('');
        }

        function tampilToast(pesan) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = pesan;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('noteInput').addEventListener('keypress', e => { if (e.key === 'Enter') tambahNote(); });
            document.getElementById('modalInput').addEventListener('keypress', e => { if (e.key === 'Enter') simpanDariModal(); });
            document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) tutupModal(); });
        });

        loadNotes();
        renderNotes();
    </script>

</body>
</html>
